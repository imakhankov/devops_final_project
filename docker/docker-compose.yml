services:                                                                                                                                                                                               
    frontend:                                                                                                                                                                                           
      build: ../frontend
      ports:
        - "8080:80"
      networks:
        - appnet

    postgres:
      image: postgres:16
      env_file: .env
      volumes:
        - pg_data:/var/lib/postgresql/data
      networks:
        - appnet

volumes:
    pg_data:

networks:                                                                                                                                                                                               
    appnet:
