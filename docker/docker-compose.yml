services:                                                                                                                                                                                               
    frontend:                                                                                                                                                                                           
      build: ../frontend
      ports:
        - "8080:80"
      networks:
        - appnet

    backend:                                                                                                                                                                                            
      build: ../backend                                                                                                                                                                                   
      networks:                                                                                                                                                                                         
        - appnet
    postgres:
      image: postgres:16
      env_file: .env
      volumes:
        - pg_data:/var/lib/postgresql/data
      networks:
        - appnet
    nginx:                                                                                                                                                                                                
      image: nginx:alpine                                                                                                                                                                                 
      ports:                                                                                                                                                                                            
        - "80:80"
      volumes:   
        - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:                                     
        - frontend                                                                                                                                                                                        
      networks:   
        - appnet
volumes:
    pg_data:

networks:                                                                                                                                                                                               
    appnet:
