services:                                                                                                                                                                                               
    frontend:                                                                                                                                                                                           
      build: ../frontend
      networks:
        - appnet

    postgres:                                                                                                                                                                      
      image: postgres:16                                                                                                                                                           
      env_file: .env
      healthcheck:                                                                                                                                                                 
        test: ["CMD", "pg_isready"]                                                                                                                                              
        interval: 5s
        timeout: 3s
        retries: 3                                                                                                                                                                 
      volumes:
      - pg_data:/var/lib/postgresql/data                                                                                                                                         
      networks:                                                                                                                                                                  
      - appnet
    backend:
      build: ../backend
      depends_on:
        postgres:
          condition: service_healthy                                                                                                                                               
      networks:
      - appnet
    nginx:                                                                                                                                                                                                
      image: nginx:alpine                                                                                                                                                                                 
      ports:                                                                                                                                                                                            
        - "80:80"
      volumes:   
        - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:                                     
        - frontend
        - backend                                                                                                                                                                                        
      networks:   
        - appnet
volumes:
    pg_data:

networks:                                                                                                                                                                                               
    appnet:
