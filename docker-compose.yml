services:                                                                                                                                                                                               
    app:                                                                                                                                                                                            
      build: .                                                                                                                                                                                   
      depends_on:
      - db 
    db:
      image: postgres:15
      env_file: .env
      volumes:
        - pg_data:/var/lib/postgresql/data 
    nginx:                                                                                                                                                                                                
      image: nginx:alpine                                                                                                                                                                                 
      ports:                                                                                                                                                                                            
        - "8081:80"
      volumes:                                                                                                                                                                                            
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
volumes:
    pg_data: