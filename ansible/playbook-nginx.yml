---
- name: Configure nginx with template
  hosts: vps
  become: true

  vars:
    server_name: "myserver.example.com"                                                                                                                                                                 
    app_port: 8080  

  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: true

    - name: Deploy nginx config from template
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/default
        mode: '0644'
      notify: Reload nginx

    - name: Enable nginx site
      file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
    - name: Create deploy info file                                                                                                                                                                     
      copy:                                                                                                                                                                                           
        content: "Server: {{ server_name }}\nPort: {{ app_port }}\n"                                                                                                                                    
        dest: /tmp/deploy_info.txt    

  handlers:
    - name: Reload nginx
      service:
        name: nginx
        state: reloaded
